name: ci/cd webrifky
on:
  push:
    branches:
      - main

jobs:
  deploywebrifky:
    runs-on: self-hosted

    steps:
      - name: Langkah 1 - checkout kode
        uses: actions/checkout@v4
      - name: langkah 2 - login docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: langkah 3 - build image
        run: docker build -t rifkyanrul/webrifky:latest .
      - name: langkah 4 - push image
        run: docker push rifkyanrul/webrifky:latest
      - name: langkah 5 - mematikan CT lama
        run: |
          docker stop webrifky || true
          docker rm webrifky || true
      - name: langkah 6 - run CT baru
        run: docker run -d --name webrifky -p 8080:80 rifkyanrul/webrifky:latest
